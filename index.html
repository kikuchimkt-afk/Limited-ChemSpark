<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemSpark 極 — 化学トレーニング</title>
  <meta name="description" content="化学の重箱の隅つつき問題を音声読み上げで演習できるプレミアムトレーニングアプリ。スキマ時間で化学を極める。">
  <link rel="icon" href="chemspark-logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== TOP PAGE ===== -->
  <div id="page-top" class="page active">
    <header class="top-header">
      <div class="logo-area">
        <div class="logo-icon-wrap">
          <img src="chemspark-logo.png" alt="ChemSpark 極" class="logo-img" width="64" height="64">
        </div>
        <div class="logo-text">
          <h1 class="logo-title">Chem<span class="logo-accent">Spark</span></h1>
          <p class="logo-subtitle">極<span class="logo-subtitle-small">きわみ</span></p>
        </div>
      </div>
      <p class="tagline">⚡ 化学を、スキマ時間で極める</p>
    </header>
    <main class="top-main">
      <div class="stats-banner">
        <div class="stat-item">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">総問題数</span>
        </div>
        <div class="stat-item stat-item--accent">
          <span class="stat-value" id="stat-solved">0</span>
          <span class="stat-label">解答済み</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-accuracy">—</span>
          <span class="stat-label">正答率</span>
        </div>
      </div>

      <!-- ===== Mode Selector ===== -->
      <div class="mode-selector" id="mode-selector">
        <button class="mode-btn active" data-mode="quiz" id="mode-quiz">
          <span class="material-symbols-rounded">quiz</span>
          問題演習
        </button>
        <button class="mode-btn" data-mode="listen" id="mode-listen">
          <span class="material-symbols-rounded">headphones</span>
          聴く演習
        </button>
      </div>

      <h2 class="section-title">
        <span class="material-symbols-rounded">menu_book</span>
        チャプター選択
      </h2>
      <div id="chapter-list" class="chapter-grid"></div>
    </main>
  </div>

  <!-- ===== QUIZ PAGE ===== -->
  <div id="page-quiz" class="page">
    <header class="quiz-header">
      <button class="btn-icon" id="btn-back" aria-label="戻る">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <div class="quiz-header-info">
        <span id="quiz-chapter-label" class="chapter-badge"></span>
        <span id="quiz-progress" class="progress-text"></span>
      </div>
      <div class="quiz-header-actions">
        <button class="btn-icon" id="btn-tts" aria-label="読み上げ" title="問題を読み上げ">
          <span class="material-symbols-rounded">volume_up</span>
        </button>
        <button class="btn-icon" id="btn-shuffle" aria-label="シャッフル" title="問題をシャッフル">
          <span class="material-symbols-rounded">shuffle</span>
        </button>
      </div>
    </header>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <main class="quiz-main">
      <div class="question-card" id="question-card">
        <div class="question-meta">
          <span class="badge badge-category" id="q-category"></span>
          <span class="badge badge-difficulty" id="q-difficulty"></span>
          <span class="badge badge-type" id="q-type"></span>
        </div>
        <p class="question-text" id="q-text"></p>
        <div class="choices-list" id="choices-list"></div>
      </div>

      <div class="explanation-card hidden" id="explanation-card">
        <div class="result-icon" id="result-icon"></div>
        <h3 class="explanation-title">解説</h3>
        <p class="explanation-text" id="explanation-text"></p>
        <div class="trap-info" id="trap-info"></div>
        <div class="mnemonic-info hidden" id="mnemonic-info">
          <span class="material-symbols-rounded">lightbulb</span>
          <span id="mnemonic-text"></span>
        </div>
      </div>
    </main>

    <footer class="quiz-footer">
      <button class="btn-primary hidden" id="btn-next">
        次の問題
        <span class="material-symbols-rounded">arrow_forward</span>
      </button>
    </footer>
  </div>

  <!-- ===== LISTEN PAGE ===== -->
  <div id="page-listen" class="page">
    <header class="quiz-header listen-header">
      <button class="btn-icon" id="listen-btn-back" aria-label="戻る">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <div class="quiz-header-info">
        <span id="listen-chapter-label" class="chapter-badge"></span>
        <span id="listen-progress" class="progress-text"></span>
      </div>
      <div class="quiz-header-actions">
        <button class="btn-icon" id="listen-btn-speed" aria-label="速度" title="読み上げ速度">
          <span class="speed-label">1x</span>
        </button>
      </div>
    </header>
    <div class="progress-bar-container">
      <div class="progress-bar" id="listen-progress-bar"></div>
    </div>

    <main class="listen-main">
      <div class="listen-visual">
        <div class="listen-orb" id="listen-orb">
          <div class="listen-orb-inner">
            <span class="listen-kanji">極</span>
          </div>
          <div class="listen-pulse"></div>
          <div class="listen-pulse listen-pulse--delayed"></div>
        </div>
        <p class="listen-status" id="listen-status">再生準備中...</p>
        <p class="listen-question-num" id="listen-question-num"></p>
      </div>

      <div class="listen-transcript" id="listen-transcript">
        <div class="listen-section" id="listen-section-q">
          <div class="listen-section-label">
            <span class="material-symbols-rounded">help</span> 問題文
          </div>
          <p class="listen-section-text" id="listen-q-text"></p>
        </div>
        <div class="listen-section" id="listen-section-choices">
          <div class="listen-section-label">
            <span class="material-symbols-rounded">list</span> 選択肢
          </div>
          <div id="listen-choices-text" class="listen-choices-list"></div>
        </div>
        <div class="listen-section listen-section--answer hidden" id="listen-section-answer">
          <div class="listen-section-label">
            <span class="material-symbols-rounded">check_circle</span> 正解・解説
          </div>
          <p class="listen-section-text" id="listen-answer-text"></p>
        </div>
      </div>

      <div class="listen-controls">
        <button class="listen-ctrl-btn" id="listen-btn-prev" aria-label="前の問題" disabled>
          <span class="material-symbols-rounded">skip_previous</span>
        </button>
        <button class="listen-ctrl-btn listen-ctrl-btn--play" id="listen-btn-play" aria-label="再生/停止">
          <span class="material-symbols-rounded" id="listen-play-icon">play_arrow</span>
        </button>
        <button class="listen-ctrl-btn" id="listen-btn-next-q" aria-label="次の問題">
          <span class="material-symbols-rounded">skip_next</span>
        </button>
      </div>
    </main>
  </div>

  <!-- ===== RESULT PAGE ===== -->
  <div id="page-result" class="page">
    <div class="result-container">
      <div class="result-circle" id="result-circle">
        <span class="result-score" id="result-score">0</span>
        <span class="result-total" id="result-total">/0</span>
      </div>
      <h2 class="result-heading" id="result-heading"></h2>
      <p class="result-sub" id="result-sub"></p>
      <div class="result-detail-grid" id="result-detail-grid"></div>
      <div class="result-actions">
        <button class="btn-primary" id="btn-retry">
          <span class="material-symbols-rounded">replay</span>
          もう一度
        </button>
        <button class="btn-secondary" id="btn-home">
          <span class="material-symbols-rounded">home</span>
          トップへ
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
