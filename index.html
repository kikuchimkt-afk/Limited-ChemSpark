<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>化学共通テスト演習</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- ==================== Start screen ==================== -->
    <section id="start-screen" class="screen active">
      <header class="hero">
        <h1>化学共通テスト演習</h1>
        <p class="subtitle">音声読み上げ付き 四択問題</p>
      </header>

      <div class="card">
        <h2>章を選ぶ</h2>
        <div id="chapter-list" class="chapter-list"></div>

        <div class="options">
          <label class="switch">
            <input type="checkbox" id="opt-shuffle-questions" />
            <span>問題をシャッフルして出題</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="opt-auto-play" checked />
            <span>音声を自動再生</span>
          </label>
          <label class="switch">
            <input type="checkbox" id="opt-auto-next" />
            <span>正解後に自動で次へ進む</span>
          </label>
          <label class="switch switch-select">
            <span class="switch-label">読み上げ速度</span>
            <select id="opt-speed">
              <option value="slow">ゆっくり（学習向け）</option>
              <option value="natural">ナチュラル</option>
              <option value="fast">早め</option>
            </select>
          </label>
        </div>

        <button id="btn-start" class="btn btn-primary btn-lg">演習を開始</button>
      </div>

      <div class="card">
        <h2>学習履歴</h2>
        <div id="history-summary" class="history-summary">読み込み中…</div>
        <button id="btn-reset-history" class="btn btn-text">履歴をリセット</button>
      </div>
    </section>

    <!-- ==================== Quiz screen ==================== -->
    <section id="quiz-screen" class="screen">
      <header class="quiz-header">
        <button id="btn-back" class="btn btn-ghost" title="章選択に戻る">← 戻る</button>
        <div class="progress">
          <div class="progress-text">
            <span id="progress-current">1</span> / <span id="progress-total">50</span>
          </div>
          <div class="progress-bar">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
          </div>
        </div>
        <div class="score">
          <span class="score-label">正解</span>
          <span id="score-correct">0</span>
          <span class="score-sep">/</span>
          <span id="score-answered">0</span>
        </div>
      </header>

      <article class="question-card">
        <div class="question-meta">
          <span id="q-category" class="badge"></span>
          <span id="q-subcategory" class="badge badge-sub"></span>
          <span id="q-difficulty" class="badge badge-diff"></span>
        </div>
        <h2 id="q-text" class="question-text"></h2>

        <div class="audio-controls">
          <button id="btn-play-question" class="btn btn-ghost" title="問題文を再生">
            🔊 問題文
          </button>
          <button id="btn-play-all" class="btn btn-ghost" title="問題と選択肢をすべて再生">
            🔊 問題＋選択肢
          </button>
          <button id="btn-stop-audio" class="btn btn-ghost" title="音声停止">
            ⏹ 停止
          </button>
          <label class="inline-speed" title="読み上げ速度">
            <span>速度</span>
            <select id="opt-speed-quiz">
              <option value="slow">ゆっくり</option>
              <option value="natural">ナチュラル</option>
              <option value="fast">早め</option>
            </select>
          </label>
        </div>

        <ul id="choice-list" class="choice-list"></ul>
      </article>

      <section id="feedback" class="feedback hidden">
        <div class="feedback-header">
          <span id="feedback-icon" class="feedback-icon"></span>
          <span id="feedback-text" class="feedback-text"></span>
        </div>
        <div class="feedback-body">
          <h3>解説</h3>
          <p id="feedback-explanation"></p>
          <div class="audio-controls">
            <button id="btn-play-explanation" class="btn btn-ghost">🔊 解説を再生</button>
          </div>
          <details id="feedback-evidence" class="evidence">
            <summary>根拠となる原典</summary>
            <ul id="feedback-evidence-list"></ul>
          </details>
          <div id="feedback-mnemonic" class="mnemonic hidden">
            <span class="mnemonic-label">語呂合わせ</span>
            <span id="feedback-mnemonic-text"></span>
          </div>
        </div>
        <div class="feedback-actions">
          <button id="btn-next" class="btn btn-primary btn-lg">次の問題 →</button>
        </div>
      </section>
    </section>

    <!-- ==================== Result screen ==================== -->
    <section id="result-screen" class="screen">
      <div class="card">
        <h1>お疲れさまでした！</h1>
        <div class="result-score">
          <span id="result-correct">0</span>
          <span class="result-sep">/</span>
          <span id="result-total">50</span>
        </div>
        <div id="result-percent" class="result-percent">0%</div>

        <h3>カテゴリ別成績</h3>
        <div id="result-by-category" class="result-breakdown"></div>

        <h3>間違えた問題</h3>
        <div id="result-wrong-list" class="wrong-list"></div>

        <div class="result-actions">
          <button id="btn-retry" class="btn btn-primary">もう一度同じ章を解く</button>
          <button id="btn-retry-wrong" class="btn btn-secondary">間違えた問題だけ復習</button>
          <button id="btn-to-start" class="btn btn-ghost">章選択に戻る</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
